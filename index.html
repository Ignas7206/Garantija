<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Garantijos" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <title>Garantijos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg2:       #f7f7f8;
      --bg3:       #efefef;
      --bg4:       #e5e5e7;
      --text:      #0f0f0f;
      --text2:     #6e6e73;
      --text3:     #aeaeb2;
      --border:    rgba(0,0,0,0.08);
      --border2:   rgba(0,0,0,0.14);
      --accent:    #1c6ef2;
      --accent-bg: #e8f0fe;
      --green:     #28a745;  --green-bg: #e6f4ea;
      --orange:    #e07b00;  --orange-bg: #fef3e2;
      --red:       #d32f2f;  --red-bg: #fde8e8;
      --gold:      #b8860b;  --gold-bg: #fdf6e3;
      --radius-sm: 10px;
      --radius:    14px;
      --radius-lg: 20px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-h: 64px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0f0f0f;
        --bg2:     #1c1c1e;
        --bg3:     #2c2c2e;
        --bg4:     #3a3a3c;
        --text:    #f5f5f7;
        --text2:   #98989d;
        --text3:   #6e6e73;
        --border:  rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.14);
        --accent:  #4d9fff;
        --accent-bg: #1a2a42;
        --green:   #4caf76;  --green-bg: #0d2e1a;
        --orange:  #ffa040;  --orange-bg: #2e1e00;
        --red:     #ef5350;  --red-bg: #2e0d0d;
        --gold:    #e0b84d;  --gold-bg: #2e2510;
      }
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    input, select, textarea, button { font-family: inherit; color: inherit; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    a { color: inherit; }

    #app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 480px; margin: 0 auto;
      position: relative; overflow: hidden;
    }
    #screen {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
    }

    #bottomNav {
      position: relative; z-index: 100;
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex; align-items: stretch;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; padding: 8px 0;
      color: var(--text3); transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn i { font-size: 22px; }
    .nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.2px; }
    .nav-add { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; padding: 8px 0; }
    .nav-add-circle { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s; }
    .nav-add-circle:active { transform: scale(0.92); opacity: 0.85; }
    .nav-add-circle i { font-size: 22px; color: #fff; }

    .page-header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); }
    .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header-sm { padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); }
    .page-header-sm h2 { font-size: 17px; font-weight: 600; flex: 1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .back-btn { width: 36px; height: 36px; background: var(--bg2); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
    .back-btn i { font-size: 18px; }
    .icon-btn { width: 36px; height: 36px; background: var(--bg2); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink:0; }

    .search-bar { margin: 0 16px 12px; position: relative; }
    .search-bar i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; }
    .search-bar input { width: 100%; background: var(--bg2); border: none; border-radius: var(--radius-sm); padding: 10px 12px 10px 36px; font-size: 15px; color: var(--text); }
    .search-bar input::placeholder { color: var(--text3); }

    .chips { display: flex; gap: 8px; padding: 0 16px 14px; overflow-x: auto; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
    .stat-tile { background: var(--bg2); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-tile .n { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-tile .l { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }

    .plan-banner { margin: 0 16px 16px; background: var(--gold-bg); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
    .plan-banner i { font-size: 20px; color: var(--gold); flex-shrink: 0; }
    .plan-banner .pb-text { flex: 1; font-size: 12.5px; color: var(--gold); line-height: 1.4; }
    .plan-banner .pb-text b { font-weight: 700; }
    .plan-banner button { background: var(--gold); color: #fff; border: none; border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 600; flex-shrink: 0; }

    .cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 8px; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 14px; display: flex; gap: 12px; align-items: flex-start; border: none; text-align: left; width: 100%; transition: opacity 0.1s; }
    .card:active { opacity: 0.7; }
    .card-thumb { width: 52px; height: 52px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; background: var(--bg3); }
    .card-icon { width: 52px; height: 52px; border-radius: var(--radius-sm); background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon i { font-size: 24px; color: var(--text3); }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
    .card-name { font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-sub { font-size: 13px; color: var(--text2); }
    .card-date { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .badge-ok { background: var(--green-bg); color: var(--green); }
    .badge-warn{ background: var(--orange-bg); color: var(--orange); }
    .badge-exp { background: var(--red-bg); color: var(--red); }

    .empty-state { padding: 80px 32px; text-align: center; }
    .empty-icon { width: 80px; height: 80px; background: var(--bg2); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .empty-icon i { font-size: 36px; color: var(--text3); }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 24px; }

    .picker-cards { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .picker-card { background: var(--bg2); border: none; border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: center; gap: 16px; text-align: left; width: 100%; transition: opacity 0.1s; }
    .picker-card:active { opacity: 0.7; }
    .picker-card:disabled { opacity: 0.5; }
    .picker-icon { width: 52px; height: 52px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .picker-icon i { font-size: 26px; }
    .picker-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .picker-card p { font-size: 13px; color: var(--text2); line-height: 1.4; }

    .form-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }
    .form-section { background: var(--bg2); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
    .form-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 0.5px solid var(--border); gap: 12px; }
    .form-row:last-child { border-bottom: none; }
    .form-row label { font-size: 15px; color: var(--text); min-width: 110px; flex-shrink: 0; }
    .form-row input, .form-row select, .form-row textarea { flex: 1; background: none; border: none; font-size: 15px; color: var(--text2); text-align: right; outline: none; min-width: 0; }
    .form-row input::placeholder, .form-row textarea::placeholder { color: var(--text3); }
    .form-row textarea { text-align: left; resize: none; line-height: 1.4; }
    .form-row select { appearance: none; -webkit-appearance: none; }
    .form-row-chevron { color: var(--text3); font-size: 14px; margin-left: 4px; flex-shrink: 0; }
    .form-label-section { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 4px; margin-bottom: 8px; }

    .warranty-sheet { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
    .warranty-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .warranty-panel { position: relative; z-index: 1; background: var(--bg2); border-radius: 20px 20px 0 0; padding-bottom: calc(16px + var(--safe-bottom)); animation: slideUp 0.25s ease; max-height: 70vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .warranty-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 2px; margin: 12px auto 16px; }
    .warranty-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 12px; color: var(--text2); }
    .warranty-opt { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: none; border: none; border-top: 0.5px solid var(--border); width: 100%; font-size: 16px; color: var(--text); text-align: left; }
    .warranty-opt.selected { color: var(--accent); font-weight: 600; }
    .warranty-opt i { font-size: 18px; color: var(--accent); }

    .doc-upload-area { margin-bottom: 20px; border-radius: var(--radius); overflow: hidden; }
    .doc-drop-zone { background: var(--bg2); border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 20px; text-align: center; cursor: pointer; display:block; }
    .doc-drop-zone i { font-size: 36px; color: var(--text3); display: block; margin-bottom: 10px; }
    .doc-drop-zone p { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
    .doc-drop-zone small { font-size: 12px; color: var(--text3); }
    .doc-preview-img { width: 100%; border-radius: var(--radius); max-height: 180px; object-fit: cover; cursor: pointer; display: block; }
    .doc-preview-pdf { background: var(--red-bg); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .doc-preview-pdf i { font-size: 28px; color: var(--red); flex-shrink: 0; }
    .doc-preview-pdf .pdf-name { font-size: 13px; font-weight: 500; color: var(--red); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .doc-preview-pdf .pdf-hint { font-size: 11px; color: var(--red); margin-top: 2px; opacity: 0.7; }
    .doc-remove-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 8px; padding: 10px; background: none; border: none; font-size: 13px; color: var(--red); }
    .doc-error { font-size: 12px; color: var(--red); padding: 6px 4px; }
    .analyzing-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; }
    .upload-progress-row { display:flex; align-items:center; gap:10px; padding:10px 4px; }
    .upload-progress-bar { flex:1; height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; }
    .upload-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.2s; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .save-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; transition: opacity 0.15s, transform 0.1s; margin-bottom: 8px; }
    .save-btn:active { transform: scale(0.98); opacity: 0.85; }
    .save-btn:disabled { opacity: 0.35; }

    .detail-status { margin: 16px; border-radius: var(--radius-lg); padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
    .detail-status i { font-size: 36px; flex-shrink: 0; }
    .detail-status .ds-label { font-size: 12px; font-weight: 600; opacity: 0.7; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-status .ds-val { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .detail-section { margin: 0 16px 16px; }
    .detail-rows { background: var(--bg2); border-radius: var(--radius); overflow: hidden; }
    .detail-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 0.5px solid var(--border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-row i { font-size: 18px; color: var(--text3); width: 20px; flex-shrink: 0; }
    .detail-row .dr-label { font-size: 14px; color: var(--text2); flex: 1; }
    .detail-row .dr-val { font-size: 14px; font-weight: 500; color: var(--text); text-align: right; }
    .notes-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
    .notes-card .nc-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .notes-card p { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .delete-btn { width: 100%; background: none; border: 1.5px solid var(--red-bg); color: var(--red); border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .delete-btn:active { opacity: 0.7; }

    .lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; }
    .lightbox-bar { display: flex; justify-content: flex-end; padding: calc(var(--safe-top) + 12px) 16px 12px; }
    .lightbox-close { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .lightbox-img { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 8px 16px; overflow: auto; }
    .lightbox-img img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }

    .login-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y:auto; }
    .login-card { width: 100%; max-width: 320px; background: var(--bg2); border-radius: var(--radius-lg); padding: 32px 24px; }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo .shield { font-size: 48px; display: block; margin-bottom: 10px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .login-logo p { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .login-input { width: 100%; background: var(--bg3); border: 1.5px solid transparent; border-radius: var(--radius-sm); padding: 14px 16px; font-size: 16px; color: var(--text); margin-bottom: 10px; outline: none; transition: border-color 0.15s; }
    .login-input:focus { border-color: var(--accent); }
    .login-input.err { border-color: var(--red); }
    .login-error { font-size: 13px; color: var(--red); text-align: center; margin-bottom: 12px; }
    .login-info { font-size: 13px; color: var(--green); text-align: center; margin-bottom: 12px; }
    .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 15px; font-size: 16px; font-weight: 600; transition: opacity 0.15s; margin-top: 4px; }
    .login-btn:active { opacity: 0.8; }
    .login-btn:disabled { opacity: 0.5; }
    .login-switch { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text2); }
    .login-switch button { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 13px; padding: 0 4px; }
    .login-divider { text-align: center; font-size: 12px; color: var(--text3); margin: 4px 0 14px; }

    .toast { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 20px; white-space: nowrap; z-index: 500; animation: toastIn 0.2s ease, toastOut 0.2s ease 2.2s forwards; max-width:90%; overflow:hidden; text-overflow:ellipsis; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    .sync-pill { position:fixed; top: calc(var(--safe-top) + 8px); left:50%; transform:translateX(-50%); background:var(--bg3); color:var(--text2); font-size:11px; font-weight:500; padding:5px 12px; border-radius:20px; z-index:400; display:flex; align-items:center; gap:6px; }
    .sync-pill.offline { background: var(--orange-bg); color: var(--orange); }
    .sync-pill .dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
    .sync-pill.offline .dot { background:var(--orange); }

    .center-loader { display:flex; align-items:center; justify-content:center; min-height:100dvh; }
    .center-loader .spinner { width:28px; height:28px; border-width:3px; }

    /* ── Card left-border accent for urgency (peripheral scanning) ── */
    .card { border-left: 3px solid transparent; }
    .card.urgent-exp  { border-left-color: var(--red); }
    .card.urgent-warn { border-left-color: var(--orange); }

    /* ── Swipe-to-delete ── */
    .swipe-wrap { position: relative; overflow: hidden; border-radius: var(--radius); }
    .swipe-wrap .card { border-radius: var(--radius); position: relative; z-index: 2; background: var(--bg2); transition: transform 0.15s ease-out; touch-action: pan-y; }
    .swipe-delete-bg { position: absolute; inset: 0; background: var(--red); border-radius: var(--radius); display: flex; align-items: center; justify-content: flex-end; padding-right: 22px; z-index: 1; }
    .swipe-delete-bg i { color: #fff; font-size: 22px; }

    /* ── Skeleton loading ── */
    .skeleton-card { background: var(--bg2); border-radius: var(--radius); padding: 14px; display: flex; gap: 12px; margin-bottom: 10px; }
    .skeleton-box { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 37%, var(--bg3) 63%); background-size: 400% 100%; animation: skeletonShine 1.4s ease infinite; border-radius: var(--radius-sm); }
    @keyframes skeletonShine { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
    .skel-thumb { width: 52px; height: 52px; flex-shrink: 0; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
    .skel-line { height: 12px; border-radius: 6px; }

    /* ── Onboarding ── */
    .onboard-wrap { min-height: 100dvh; display: flex; flex-direction: column; padding: 0; }
    .onboard-slides { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .onboard-slides::-webkit-scrollbar { display: none; }
    .onboard-slide { flex: 0 0 100%; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; }
    .onboard-icon { width: 96px; height: 96px; border-radius: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
    .onboard-icon i { font-size: 44px; }
    .onboard-slide h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
    .onboard-slide p { font-size: 14.5px; color: var(--text2); line-height: 1.55; max-width: 280px; }
    .onboard-dots { display: flex; justify-content: center; gap: 6px; padding: 16px; }
    .onboard-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bg4); transition: all 0.2s; }
    .onboard-dot.active { width: 18px; background: var(--accent); }
    .onboard-footer { padding: 0 24px calc(24px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 10px; }
    .onboard-skip { background: none; border: none; color: var(--text2); font-size: 14px; padding: 10px; }

    /* ── Long-press hint pulse on add button ── */
    @keyframes addPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(28,110,242,0.3);} 50% { box-shadow: 0 0 0 6px rgba(28,110,242,0);} }
    .nav-add-circle.pulse { animation: addPulse 1.6s ease-out 2; }

    /* ── QR scanner ── */
    .qr-scanner { position: fixed; inset: 0; z-index: 350; background: #000; display: flex; flex-direction: column; }
    .qr-scanner video { flex: 1; object-fit: cover; width: 100%; }
    .qr-scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 240px; height: 240px; border: 2px solid #fff; border-radius: 16px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); }
    .qr-scanner-bar { position: absolute; top: calc(var(--safe-top) + 12px); left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
    .qr-scanner-bar .back-btn { background: rgba(255,255,255,0.15); color: #fff; }
    .qr-scanner-hint { position: absolute; bottom: calc(var(--safe-bottom) + 24px); left: 0; right: 0; text-align: center; color: #fff; font-size: 14px; padding: 0 32px; z-index: 2; }
    .qr-link-btn { background: var(--bg2); border: none; border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 14px; color: var(--text); font-size: 13px; font-weight: 500; }
    .qr-link-btn i { font-size: 18px; color: var(--accent); }
  </style>
</head>

<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Garantijos" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <title>Garantijos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg2:       #f7f7f8;
      --bg3:       #efefef;
      --bg4:       #e5e5e7;
      --text:      #0f0f0f;
      --text2:     #6e6e73;
      --text3:     #aeaeb2;
      --border:    rgba(0,0,0,0.08);
      --border2:   rgba(0,0,0,0.14);
      --accent:    #1c6ef2;
      --accent-bg: #e8f0fe;
      --green:     #28a745;  --green-bg: #e6f4ea;
      --orange:    #e07b00;  --orange-bg: #fef3e2;
      --red:       #d32f2f;  --red-bg: #fde8e8;
      --radius-sm: 10px;
      --radius:    14px;
      --radius-lg: 20px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-h: 64px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0f0f0f;
        --bg2:     #1c1c1e;
        --bg3:     #2c2c2e;
        --bg4:     #3a3a3c;
        --text:    #f5f5f7;
        --text2:   #98989d;
        --text3:   #6e6e73;
        --border:  rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.14);
        --accent:  #4d9fff;
        --accent-bg: #1a2a42;
        --green:   #4caf76;  --green-bg: #0d2e1a;
        --orange:  #ffa040;  --orange-bg: #2e1e00;
        --red:     #ef5350;  --red-bg: #2e0d0d;
      }
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    input, select, textarea, button { font-family: inherit; color: inherit; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* ── App shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Screen container ── */
    #screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
    }

    /* ── Bottom nav ── */
    #bottomNav {
      position: relative;
      z-index: 100;
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: stretch;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      padding: 8px 0;
      color: var(--text3);
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn i { font-size: 22px; }
    .nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.2px; }
    .nav-add {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-add-circle {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .nav-add-circle:active { transform: scale(0.92); opacity: 0.85; }
    .nav-add-circle i { font-size: 22px; color: #fff; }

    /* ── Page header ── */
    .page-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 0.5px solid var(--border);
    }
    .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header-sm {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 0.5px solid var(--border);
    }
    .page-header-sm h2 { font-size: 17px; font-weight: 600; flex: 1; }
    .back-btn {
      width: 36px; height: 36px;
      background: var(--bg2);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .back-btn i { font-size: 18px; }
    .icon-btn {
      width: 36px; height: 36px;
      background: var(--bg2);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text2);
    }

    /* ── Search bar ── */
    .search-bar {
      margin: 0 16px 12px;
      position: relative;
    }
    .search-bar i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--text3);
      pointer-events: none;
    }
    .search-bar input {
      width: 100%;
      background: var(--bg2);
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 12px 10px 36px;
      font-size: 15px;
      color: var(--text);
    }
    .search-bar input::placeholder { color: var(--text3); }

    /* ── Filter chips ── */
    .chips {
      display: flex; gap: 8px;
      padding: 0 16px 14px;
      overflow-x: auto; scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      font-size: 13px; font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      transition: all 0.15s;
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 0 16px 16px;
    }
    .stat-tile {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }
    .stat-tile .n { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-tile .l { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }

    /* ── Item cards ── */
    .cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 8px; }
    .card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px;
      display: flex; gap: 12px; align-items: flex-start;
      border: none;
      text-align: left;
      width: 100%;
      transition: opacity 0.1s;
    }
    .card:active { opacity: 0.7; }
    .card-thumb {
      width: 52px; height: 52px;
      border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0;
    }
    .card-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius-sm);
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-icon i { font-size: 24px; color: var(--text3); }
    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
    .card-name { font-size: 15px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-sub { font-size: 13px; color: var(--text2); }
    .card-date { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

    /* ── Badges ── */
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-ok  { background: var(--green-bg);  color: var(--green); }
    .badge-warn{ background: var(--orange-bg); color: var(--orange); }
    .badge-exp { background: var(--red-bg);    color: var(--red); }

    /* ── Empty state ── */
    .empty-state {
      padding: 80px 32px;
      text-align: center;
    }
    .empty-icon {
      width: 80px; height: 80px;
      background: var(--bg2);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .empty-icon i { font-size: 36px; color: var(--text3); }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 24px; }

    /* ── Add picker ── */
    .picker-cards { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .picker-card {
      background: var(--bg2);
      border: none;
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
      text-align: left;
      width: 100%;
      transition: opacity 0.1s;
    }
    .picker-card:active { opacity: 0.7; }
    .picker-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .picker-icon i { font-size: 26px; }
    .picker-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .picker-card p  { font-size: 13px; color: var(--text2); line-height: 1.4; }

    /* ── Form ── */
    .form-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }
    .form-section {
      background: var(--bg2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .form-row {
      display: flex; align-items: center;
      padding: 13px 16px;
      border-bottom: 0.5px solid var(--border);
      gap: 12px;
    }
    .form-row:last-child { border-bottom: none; }
    .form-row label {
      font-size: 15px; color: var(--text);
      min-width: 110px; flex-shrink: 0;
    }
    .form-row input, .form-row select, .form-row textarea {
      flex: 1; background: none; border: none;
      font-size: 15px; color: var(--text2);
      text-align: right; outline: none;
      min-width: 0;
    }
    .form-row input::placeholder, .form-row textarea::placeholder { color: var(--text3); }
    .form-row textarea { text-align: left; resize: none; line-height: 1.4; }
    .form-row select { appearance: none; -webkit-appearance: none; }
    .form-row-chevron { color: var(--text3); font-size: 14px; margin-left: 4px; flex-shrink: 0; }

    .form-label-section {
      font-size: 12px; font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 0 4px;
      margin-bottom: 8px;
    }

    /* ── Warranty dropdown ── */
    .warranty-sheet {
      position: fixed; inset: 0;
      z-index: 200;
      display: flex; flex-direction: column;
      justify-content: flex-end;
    }
    .warranty-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
    }
    .warranty-panel {
      position: relative; z-index: 1;
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      padding-bottom: calc(16px + var(--safe-bottom));
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .warranty-handle {
      width: 36px; height: 4px;
      background: var(--bg4);
      border-radius: 2px;
      margin: 12px auto 16px;
    }
    .warranty-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 12px; color: var(--text2); }
    .warranty-opt {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: none; border: none; border-top: 0.5px solid var(--border);
      width: 100%; font-size: 16px; color: var(--text); text-align: left;
    }
    .warranty-opt.selected { color: var(--accent); font-weight: 600; }
    .warranty-opt i { font-size: 18px; color: var(--accent); }

    /* ── Document upload ── */
    .doc-upload-area {
      margin-bottom: 20px;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .doc-drop-zone {
      background: var(--bg2);
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .doc-drop-zone i { font-size: 36px; color: var(--text3); display: block; margin-bottom: 10px; }
    .doc-drop-zone p { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
    .doc-drop-zone small { font-size: 12px; color: var(--text3); }
    .doc-preview-img {
      width: 100%; border-radius: var(--radius);
      max-height: 180px; object-fit: cover;
      cursor: pointer;
      display: block;
    }
    .doc-preview-pdf {
      background: var(--red-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .doc-preview-pdf i { font-size: 28px; color: var(--red); flex-shrink: 0; }
    .doc-preview-pdf .pdf-name { font-size: 13px; font-weight: 500; color: var(--red); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .doc-preview-pdf .pdf-hint { font-size: 11px; color: var(--red); margin-top: 2px; opacity: 0.7; }
    .doc-remove-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      width: 100%; margin-top: 8px;
      padding: 10px;
      background: none; border: none;
      font-size: 13px; color: var(--red);
    }
    .doc-error { font-size: 12px; color: var(--red); padding: 6px 4px; }
    .analyzing-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 4px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Save button ── */
    .save-btn {
      width: 100%;
      background: var(--accent);
      color: #fff; border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px; font-weight: 600;
      letter-spacing: 0.2px;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 8px;
    }
    .save-btn:active { transform: scale(0.98); opacity: 0.85; }
    .save-btn:disabled { opacity: 0.35; }

    /* ── Detail view ── */
    .detail-status {
      margin: 16px;
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .detail-status i { font-size: 36px; flex-shrink: 0; }
    .detail-status .ds-label { font-size: 12px; font-weight: 600; opacity: 0.7; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-status .ds-val { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .detail-section { margin: 0 16px 16px; }
    .detail-rows {
      background: var(--bg2);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .detail-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row i { font-size: 18px; color: var(--text3); width: 20px; flex-shrink: 0; }
    .detail-row .dr-label { font-size: 14px; color: var(--text2); flex: 1; }
    .detail-row .dr-val { font-size: 14px; font-weight: 500; color: var(--text); text-align: right; }
    .notes-card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 14px 16px;
    }
    .notes-card .nc-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .notes-card p { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .delete-btn {
      width: 100%; background: none;
      border: 1.5px solid var(--red-bg);
      color: var(--red); border-radius: var(--radius);
      padding: 14px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .delete-btn:active { opacity: 0.7; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.96);
      display: flex; flex-direction: column;
    }
    .lightbox-bar {
      display: flex; justify-content: flex-end;
      padding: calc(var(--safe-top) + 12px) 16px 12px;
    }
    .lightbox-close {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 50%;
      color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-img {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 0 8px 16px; overflow: auto;
    }
    .lightbox-img img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }

    /* ── Login ── */
    .login-wrap {
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%; max-width: 320px;
      background: var(--bg2); border-radius: var(--radius-lg);
      padding: 32px 24px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .shield { font-size: 52px; display: block; margin-bottom: 10px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .login-logo p  { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .login-input {
      width: 100%; background: var(--bg3);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      padding: 14px 16px; font-size: 16px; color: var(--text);
      margin-bottom: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input.err    { border-color: var(--red); }
    .login-error { font-size: 13px; color: var(--red); text-align: center; margin-bottom: 12px; }
    .login-btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 15px; font-size: 16px; font-weight: 600;
      transition: opacity 0.15s;
    }
    .login-btn:active { opacity: 0.8; }
    .login-btn:disabled { opacity: 0.4; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 20px;
      white-space: nowrap; z-index: 500;
      animation: toastIn 0.2s ease, toastOut 0.2s ease 2s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ── Misc ── */
    .section-gap { height: 28px; }
  </style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="bottomNav" style="display:none">
    <button class="nav-btn active" data-tab="list" id="navList">
      <i class="ti ti-shield-check"></i>
      <span>Garantijos</span>
    </button>
    <button class="nav-add" id="navAdd">
      <div class="nav-add-circle"><i class="ti ti-plus"></i></div>
    </button>
    <button class="nav-btn" data-tab="search" id="navSearch">
      <i class="ti ti-search"></i>
      <span>Ieškoti</span>
    </button>
  </nav>
</div>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
